<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Opeyemi</title>
<style>
body {margin:0;font-family:sans-serif;background:linear-gradient(135deg,#ff9a9e,#fad0c4);overflow:hidden;}

#lockScreen{position:fixed;width:100%;height:100%;display:flex;justify-content:center;align-items:center;flex-direction:column;background:#ff9a9e;z-index:10;}
input,button{padding:10px;border-radius:10px;border:none;margin-top:10px}
button{background:#ff6f91;color:white;cursor:pointer}

.container{display:none;margin:40px auto;max-width:700px;padding:25px;border-radius:20px;background:rgba(255,255,255,0.2);backdrop-filter:blur(15px);text-align:center;color:#fff;}

/* Glowing Name */
.glow{font-size:1.8em;color:white;animation:glow 2s infinite alternate;}
@keyframes glow{from{text-shadow:0 0 10px #fff,0 0 20px #ff6f91;}to{text-shadow:0 0 20px #fff,0 0 40px #ff3f6c;}}

img{width:100%;border-radius:12px;margin-top:10px}
.hidden{display:none;margin-top:20px;font-weight:bold}

/* Envelope */
.envelope{width:200px;height:120px;background:#ff6f91;margin:20px auto;position:relative;cursor:pointer;}
.envelope:before{content:'';position:absolute;width:0;height:0;border-left:100px solid transparent;border-right:100px solid transparent;border-bottom:60px solid #ff3f6c;top:-60px;left:0;}
.letter{display:none;background:white;color:#333;padding:15px;border-radius:10px;margin-top:10px;}

/* Hearts */
.heart{position:absolute;width:15px;height:15px;background:red;transform:rotate(45deg);animation:float 6s linear infinite;}
.heart:before,.heart:after{content:'';position:absolute;width:15px;height:15px;background:red;border-radius:50%}
.heart:before{top:-7px}.heart:after{left:-7px}
@keyframes float{0%{transform:translateY(100vh)}100%{transform:translateY(-10vh);opacity:0}}

/* Fireworks */
.firework{position:absolute;width:5px;height:5px;background:white;border-radius:50%;animation:explode 1s ease-out;}
@keyframes explode{0%{transform:scale(1);opacity:1}100%{transform:scale(20);opacity:0}}

</style>
</head>
<body>

<div id="lockScreen">
<h2>Enter Password 💖</h2>
<input type="password" id="password">
<button onclick="unlock()">Open 🎁</button>
</div>

<audio id="bgMusic" loop>
<source src="your-music-file.mp3" type="audio/mpeg">
</audio>

<div class="container" id="main">
<h1 class="glow">Happy Birthday, Opeyemi Iyanuoluwa Usamot 🎉</h1>

<p id="typeText"></p>

<!-- Envelope -->
<div class="envelope" onclick="openLetter()"></div>
<div class="letter" id="letter">
  Dear Opeyemi 💖,<br><br>
  You are truly special, and I hope this new year brings you everything beautiful, peaceful, and fulfilling. Keep shining and growing into the amazing person you are becoming.<br><br>
  — Klause
</div>

<img src="photo1.jpg">
<img src="photo2.jpg">

<button onclick="showMessage()">Click for a surprise 💫</button>
<p id="extra" class="hidden">Cheers to a better you 🥂✨</p>

<h3 id="countdown"></h3>

<!-- WhatsApp Share -->
<button onclick="shareWhatsApp()">Share ❤️</button>

</div>

<script>
function unlock(){
 let p=document.getElementById('password').value;
 if(p==='Ajike23'){
  lockScreen.style.display='none';
  main.style.display='block';
  bgMusic.play();
  typeWriter();
 }
}

function openLetter(){
 document.getElementById('letter').style.display='block';
}

function showMessage(){
 extra.style.display='block';
 fireworkEffect();
}

// Typewriter
const text="You are amazing, strong, and truly special. May this year bring you joy, growth, and everything beautiful.";
let i=0;
function typeWriter(){
 if(i<text.length){
  document.getElementById('typeText').innerHTML+=text.charAt(i);
  i++;
  setTimeout(typeWriter,40);
 }
}

// Hearts
setInterval(()=>{
 let h=document.createElement('div');
 h.className='heart';
 h.style.left=Math.random()*100+'vw';
 document.body.appendChild(h);
 setTimeout(()=>h.remove(),6000);
},300);

// Fireworks
function fireworkEffect(){
 for(let i=0;i<10;i++){
  let f=document.createElement('div');
  f.className='firework';
  f.style.left=Math.random()*100+'vw';
  f.style.top=Math.random()*100+'vh';
  document.body.appendChild(f);
  setTimeout(()=>f.remove(),1000);
 }
}

// Countdown to tomorrow
let target=new Date();
target.setDate(target.getDate()+1);
target.setHours(0,0,0,0);
setInterval(()=>{
 let now=new Date();
 let diff=target-now;
 let h=Math.floor(diff/1000/60/60);
 let m=Math.floor(diff/1000/60)%60;
 let s=Math.floor(diff/1000)%60;
 document.getElementById('countdown').innerHTML=`Countdown: ${h}h ${m}m ${s}s`;
},1000);

// WhatsApp share
function shareWhatsApp(){
 let url=window.location.href;
 let text="Open this special birthday surprise 🎁";
 window.open(`https://wa.me/?text=${encodeURIComponent(text+' '+url)}`,'_blank');
}
</script>

</body>
</html>
